    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />

    <title>ERPOS V2 — Sistema PDV</title>
    <!-- Meta Pixel Code -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      // Dois datasets: o site alimenta AMBOS (fbq('track') faz broadcast p/ todos
      // os pixels inicializados). '...0561' = conta antiga (campanha ativa);
      // '...6871' = El Patron API (conta nova). Cada conta otimiza a sua campanha.
      fbq('init', '1021977890320561');
      fbq('init', '1517617819416871');
      fbq('track', 'PageView');
    </script>
    <!-- End Meta Pixel Code -->
  </head>

    <!-- Meta Pixel: fallback sem JavaScript (noscript não é permitido no head) -->

    /></noscript>
